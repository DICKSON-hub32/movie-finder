name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "my-first-react-app/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Create frontend env file
        working-directory: ./my-first-react-app
        run: |
          cat <<EOF > .env.local
          VITE_TMDB_API_KEY=${{ secrets.VITE_TMDB_API_KEY }}
          VITE_APPWRITE_PROJECT_ID=${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_DATABASE_ID=${{ secrets.VITE_APPWRITE_DATABASE_ID }}
          VITE_APPWRITE_COLLECTION_ID=${{ secrets.VITE_APPWRITE_COLLECTION_ID }}
          VITE_APPWRITE_FAVORITES_COLLECTION_ID=${{ secrets.VITE_APPWRITE_FAVORITES_COLLECTION_ID }}
          VITE_APPWRITE_RATINGS_COLLECTION_ID=${{ secrets.VITE_APPWRITE_RATINGS_COLLECTION_ID }}
          VITE_EMAILJS_SERVICE_ID=${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID=${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY=${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_WATCHMODE_API_KEY=${{ secrets.VITE_WATCHMODE_API_KEY }}
          VITE_JUSTWATCH_COUNTRY=${{ secrets.VITE_JUSTWATCH_COUNTRY }}
          EOF

      - name: Install frontend dependencies
        working-directory: ./my-first-react-app
        run: npm ci

      - name: Build frontend
        working-directory: ./my-first-react-app
        run: npm run build

      - name: Deploy frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_FRONTEND_SERVER }}
          username: ${{ secrets.FTP_FRONTEND_USERNAME }}
          password: ${{ secrets.FTP_FRONTEND_PASSWORD }}
          local-dir: ./my-first-react-app/dist/
          server-dir: ${{ secrets.FTP_FRONTEND_DIR }}
          dangerous-clean-slate: false
